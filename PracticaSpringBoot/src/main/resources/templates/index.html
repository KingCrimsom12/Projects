<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo General</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: gray;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 36px;
        }

        button {
            background-color: #3498db;
            color: white;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.1);
        }

        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Catálogo General</h1>

<button>
<a th:href="@{/books}">Catalogo Libros</a>
</button>
<button>
<a th:href="@{/discs}">Catalogo Discos</a>
</button>
<button>
<a th:href="@{/films}">Catalogo Peliculas</a>
</button>

</body>
</html>
